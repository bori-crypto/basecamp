name: Deploy Image Gatekeeper (Worker Only)

on:
  push:
    branches:
      - main

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Image Gatekeeper to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # 💡 [핵심] 실패했던 'secrets' 부분만 쏙 뺐어! 
          # 이제 권한 에러 없이 배포만 완벽하게 성공할 거야.
