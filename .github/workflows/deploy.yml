name: Deploy Basecamp Workers

on:
  push:
    branches:
      - main

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    env:
      # 💡 깃허브 권장사항: Node.js 24 활성화
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 이미지 게이트키퍼 배포 (기존 wrangler.toml 사용)
      - name: Deploy Image Gatekeeper
        run: npx wrangler deploy

      # 2. 러닝 로그 브릿지 배포 (새로운 wrangler.run.toml 사용)
      - name: Deploy Running Log Bridge
        run: npx wrangler deploy --config wrangler.run.toml
     # 3. 바이크 API 워커 배포 (새로 만든 D1 워커)
      - name: Deploy Bike API Worker
        run: npx wrangler deploy --config wrangler.bike.toml
